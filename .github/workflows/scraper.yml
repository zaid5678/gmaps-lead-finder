name: Daily Lead Scraper

on:
  schedule:
    - cron: '0 8 * * *'   # 08:00 UTC daily (09:00 BST / 08:00 GMT)
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 240    # 4-hour hard limit (leaves headroom)

    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Install Playwright browsers
        run: playwright install chromium --with-deps

      - name: Create output directories
        run: mkdir -p output/logs

      - name: Scrape roofing leads
        env:
          GMAIL_EMAIL: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
        run: |
          python scraper_master.py \
            --categories "roofer" \
            --cities "London,Manchester,Birmingham,Leeds,Liverpool,Bristol,Sheffield,Nottingham,Leicester,Newcastle" \
            --max-results 15

      - name: Verify leads (filter businesses that actually have websites)
        run: python verify_leads.py

      - name: Commit and push updated leads
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git remote set-url origin https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}.git
          git pull --rebase origin main
          git add output/all_leads.csv
          if git diff --cached --quiet; then
            echo "Nothing new to commit"
          else
            git commit -m "chore: roofing leads scrape $(date -u '+%Y-%m-%d')"
            git push origin main
          fi

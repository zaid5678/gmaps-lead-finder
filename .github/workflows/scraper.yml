name: Daily Lead Scraper

on:
  schedule:
    - cron: '0 8 * * *'   # 08:00 UTC daily
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 210    # 3.5-hour hard limit

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Install Playwright browsers
        run: playwright install chromium --with-deps

      - name: Create output directories
        run: mkdir -p output/logs

      # Each run targets a rotating batch of cities not yet scraped today.
      # 3 trades x 4 cities x 8 results = 96 detail pages / 4 workers ≈ 1.5–2 hrs
      - name: Scrape leads
        env:
          GMAIL_EMAIL: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
        run: |
          python scraper_master.py \
            --categories "roofer,plumber,electrician" \
            --cities "Glasgow,Edinburgh,Cardiff,Southampton" \
            --max-results 8 \
            --pw-workers 4

      - name: Verify leads (filter businesses that have websites)
        run: python verify_leads.py

      - name: Update README leads table
        run: python update_readme.py

      - name: Commit and push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git remote set-url origin https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}.git
          git pull --rebase origin main
          git add output/all_leads.csv README.md
          if git diff --cached --quiet; then
            echo "Nothing new to commit"
          else
            git commit -m "chore: leads scrape $(date -u '+%Y-%m-%d') — Glasgow/Edinburgh/Cardiff/Southampton"
            git push origin main
          fi

name: Daily Lead Scraper

on:
  schedule:
    - cron: '0 8 * * *'   # 08:00 UTC daily (09:00 BST / 08:00 GMT)
  workflow_dispatch:        # allow manual trigger from GitHub UI

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 300    # 5-hour hard limit

    permissions:
      contents: write       # needed to push README + seen_leads.json back

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0    # full history so we can push back

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Install Playwright browsers
        run: playwright install chromium --with-deps

      - name: Run scraper
        env:
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
        run: |
          python scraper.py \
            --keywords "barber,plumber,electrician,restaurant,cafe,dentist,personal trainer,car mechanic" \
            --cities "London, UK|Manchester, UK|Birmingham, UK|Leeds, UK|Liverpool, UK|Sheffield, UK|Bristol, UK|Nottingham, UK|Leicester, UK|Newcastle, UK" \
            --min-reviews 50 \
            --max-results 15 \
            --send-email

      - name: Commit updated README and seen leads
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git pull --rebase origin main
          git add README.md output/seen_leads.json
          git diff --cached --quiet && echo "Nothing to commit" || \
            git commit -m "chore: daily lead scraper run $(date -u '+%Y-%m-%d')"
          git push origin main

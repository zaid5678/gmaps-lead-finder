name: Daily Lead Scraper

on:
  schedule:
    - cron: '0 8 * * *'   # 08:00 UTC daily
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 210

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Install Playwright browsers
        run: playwright install chromium --with-deps

      - name: Create output directories
        run: mkdir -p output/logs

      - name: Select today's city batch
        run: |
          python3 - << 'EOF'
          import os
          from datetime import datetime

          ALL_CITIES = [
              "London", "Manchester", "Birmingham", "Leeds", "Glasgow",
              "Edinburgh", "Bristol", "Liverpool", "Sheffield", "Newcastle",
              "Nottingham", "Cardiff", "Leicester", "Bradford", "Coventry",
              "Belfast", "Hull", "Stoke", "Wolverhampton", "Derby",
              "Southampton", "Portsmouth", "Brighton", "Plymouth", "Reading",
              "Bolton", "Luton", "Preston", "Aberdeen", "Milton Keynes",
              "Sunderland", "Norwich", "Dundee", "Ipswich", "York",
              "Gloucester", "Oxford", "Cambridge", "Peterborough", "Swansea",
              "Blackpool", "Bournemouth", "Middlesbrough", "Swindon", "Huddersfield",
              "Warrington", "Southend", "Telford", "Exeter", "Guildford",
          ]

          BATCH_SIZE   = 4
          day          = datetime.now().timetuple().tm_yday
          num_batches  = -(-len(ALL_CITIES) // BATCH_SIZE)   # ceil division
          batch_idx    = (day - 1) % num_batches
          start        = batch_idx * BATCH_SIZE
          cities       = ALL_CITIES[start : start + BATCH_SIZE]
          cities_str   = ",".join(cities)
          label        = "/".join(cities)

          print(f"Day {day} → batch {batch_idx + 1}/{num_batches}: {cities_str}")

          with open(os.environ["GITHUB_ENV"], "a") as f:
              f.write(f"TODAY_CITIES={cities_str}\n")
              f.write(f"CITY_BATCH_LABEL={label}\n")
          EOF

      - name: Scrape leads
        env:
          GMAIL_EMAIL: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
        run: |
          python scraper_master.py \
            --categories "roofer,plumber,electrician" \
            --cities "$TODAY_CITIES" \
            --max-results 8 \
            --pw-workers 4

      - name: Verify leads (filter businesses that have websites)
        run: python verify_leads.py

      - name: Update README leads table
        run: python update_readme.py

      - name: Email new leads to owner
        env:
          GMAIL_EMAIL: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
        run: python notify_leads.py

      - name: Commit and push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git remote set-url origin https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}.git
          git pull --rebase origin main
          git add output/all_leads.csv README.md
          if git diff --cached --quiet; then
            echo "Nothing new to commit"
          else
            git commit -m "chore: leads scrape $(date -u '+%Y-%m-%d') — $CITY_BATCH_LABEL"
            git push origin main
          fi
